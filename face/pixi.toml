[project]
name = "face-recognition"
version = "0.1.0"
description = "Face recognition app that learns faces over time"
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[dependencies]
python = ">=3.11,<3.13"
dlib = "*"
numpy = "*"
face_recognition = "*"
face_recognition_models = "*"
setuptools = "<80"
python-sounddevice = "*"
scipy = "*"
opencv = ">=4.13.0,<5"

[pypi-dependencies]
piper-tts = "*"
faster-whisper = "*"
onnxruntime = ">=1.23.2, <2"
torch = "*"
torchaudio = "*"
noisereduce = "*"

[tasks]
run = "python main.py"
